# bal-devnet-7 — Besu (EL) + Lighthouse (CL)
# Generated/managed by setup.sh — see README.md for usage.

services:
  besu:
    image: ${BESU_IMAGE}
    container_name: devnet7-besu
    restart: unless-stopped
    networks:
      - devnet7
    ports:
      - "${BESU_RPC_PORT:-8545}:8545"
      - "${BESU_ENGINE_PORT:-8551}:8551"
      - "${BESU_P2P_PORT:-30303}:30303/tcp"
      - "${BESU_P2P_PORT:-30303}:30303/udp"
      - "${BESU_METRICS_PORT:-6060}:6060"
    volumes:
      - ${BESU_DATA_DIR}:/var/lib/besu
      - ${CONFIG_DIR}:/config:ro
      - ${JWT_DIR}/execution-auth.jwt:/execution-auth.jwt:ro
    environment:
      BESU_USE_STATIC_NODES: ${BESU_USE_STATIC_NODES:-false}
      BESU_LOG_LEVEL: ${BESU_LOG_LEVEL:-INFO}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        set -- \
          --genesis-file=/config/besu.json \
          --data-path=/var/lib/besu \
          --nat-method=NONE \
          --p2p-host=${P2P_HOST:-0.0.0.0} \
          --p2p-port=30303 \
          --rpc-http-enabled \
          --rpc-http-host=0.0.0.0 \
          --rpc-http-port=8545 \
          --rpc-http-cors-origins=* \
          --host-allowlist=* \
          --engine-jwt-secret=/execution-auth.jwt \
          --engine-rpc-enabled \
          --engine-rpc-port=8551 \
          --engine-host-allowlist=* \
          --metrics-enabled \
          --metrics-host=0.0.0.0 \
          --metrics-port=6060 \
          --bootnodes=${BESU_BOOTNODES} \
          --rpc-http-api=ADMIN,DEBUG,ETH,MINER,NET,TRACE,TXPOOL,WEB3 \
          --sync-mode=FULL \
          --data-storage-format=BONSAI \
          --bonsai-limit-trie-logs-enabled=false \
          --logging=$${BESU_LOG_LEVEL:-INFO}
        if [ "$$BESU_USE_STATIC_NODES" = "true" ]; then
          set -- "$$@" --static-nodes-file=/config/static-nodes.json
        fi
        MAX_PEERS='${BESU_MAX_PEERS:-}'
        if [ -n "$$MAX_PEERS" ]; then
          set -- "$$@" --max-peers="$$MAX_PEERS"
        fi
        exec besu-entry.sh "$$@"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8545' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s

  lighthouse:
    image: ${LIGHTHOUSE_IMAGE}
    container_name: devnet7-lighthouse
    restart: unless-stopped
    networks:
      - devnet7
    depends_on:
      besu:
        condition: service_healthy
    ports:
      - "${LIGHTHOUSE_HTTP_PORT:-5052}:5052"
      - "${LIGHTHOUSE_P2P_PORT:-9000}:9000/tcp"
      - "${LIGHTHOUSE_P2P_PORT:-9000}:9000/udp"
      - "${LIGHTHOUSE_METRICS_PORT:-5054}:5054"
    volumes:
      - ${LIGHTHOUSE_DATA_DIR}:/var/lib/lighthouse
      - ${CONFIG_DIR}:/config:ro
      - ${JWT_DIR}/execution-auth.jwt:/execution-auth.jwt:ro
    command:
      - lighthouse
      - beacon_node
      - --testnet-dir=/config
      - --datadir=/var/lib/lighthouse
      - --execution-endpoint=http://besu:8551
      - --execution-jwt=/execution-auth.jwt
      - --checkpoint-sync-url=${LIGHTHOUSE_CHECKPOINT_SYNC_URL}
      - --boot-nodes=${LIGHTHOUSE_BOOTNODES}
      - --http
      - --http-address=0.0.0.0
      - --http-port=5052
      - --metrics
      - --metrics-address=0.0.0.0
      - --metrics-port=5054
      - --port=9000
      - --discovery-port=9000
      - --enr-udp-port=9000
      - --enr-tcp-port=9000

networks:
  devnet7:
    name: bal-devnet7
    driver: bridge
