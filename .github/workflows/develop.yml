name: docker develop build test and publish

on:
  push:
    branches:
      - main

env:
  registry: docker.io

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: hadoLint
        run: docker run --rm -i hadolint/hadolint < docker/Dockerfile

  buildDocker:
    needs: hadolint
    permissions:
      contents: read
    outputs:
      version: ${{ steps.prep.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-latest
          - besu-arm64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Prepare
        id: prep
        run: |
          platform=${{ matrix.platform }}
          if [ "$platform" = 'ubuntu-latest' ]; then
            echo "PLATFORM_PAIR=linux-amd64" >> $GITHUB_OUTPUT
            echo "ARCH=amd64" >> $GITHUB_OUTPUT
          else
            echo "PLATFORM_PAIR=linux-arm64" >> $GITHUB_OUTPUT
            echo "ARCH=arm64" >> $GITHUB_OUTPUT
          fi
          echo "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          DATE_TIME=$(date +"%y.%-m")
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_TARGET_NAME="${DATE_TIME}-develop-${SHORT_SHA}"
          echo "Build Target Name: $BUILD_TARGET_NAME"
          echo "BUILD_TARGET_NAME=${BUILD_TARGET_NAME}" >> $GITHUB_ENV
          echo "version=${BUILD_TARGET_NAME}" >> $GITHUB_OUTPUT

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-disabled: true

      - name: Stage Docker build context
        run: ./gradlew --no-daemon distDockerCopy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to ${{ env.registry }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.registry }}
          username: ${{ secrets.DOCKER_USER_RW }}
          password: ${{ secrets.DOCKER_PASSWORD_RW }}

      - name: Build and load for testing
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: build/docker-besu
          load: true
          build-args: |
            VERSION=${{ env.BUILD_TARGET_NAME }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build-date }}
          tags: hyperledger/besu:test-${{ steps.prep.outputs.ARCH }}
          cache-from: type=gha,scope=develop-build-${{ steps.prep.outputs.ARCH }}
          cache-to: type=gha,mode=max,scope=develop-build-${{ steps.prep.outputs.ARCH }}

      - name: Download Goss binaries
        run: ./gradlew --no-daemon downloadGossBinaries

      - name: Run Docker tests
        env:
          architecture: ${{ steps.prep.outputs.ARCH }}
        run: |
          mkdir -p docker/reports
          cd docker && ./test.sh hyperledger/besu:test-${{ steps.prep.outputs.ARCH }}

      - name: Push by digest
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: build/docker-besu
          platforms: linux/${{ steps.prep.outputs.ARCH }}
          provenance: false
          build-args: |
            VERSION=${{ env.BUILD_TARGET_NAME }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build-date }}
          outputs: type=image,name=${{ env.registry }}/${{ secrets.DOCKER_ORG }}/besu,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=develop-build-${{ steps.prep.outputs.ARCH }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ steps.prep.outputs.ARCH }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    needs: buildDocker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to ${{ env.registry }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.registry }}
          username: ${{ secrets.DOCKER_USER_RW }}
          password: ${{ secrets.DOCKER_PASSWORD_RW }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.registry }}/${{ secrets.DOCKER_ORG }}/besu:${{ needs.buildDocker.outputs.version }} \
            $(printf '${{ env.registry }}/${{ secrets.DOCKER_ORG }}/besu@sha256:%s ' $(ls /tmp/digests/))

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.registry }}/${{ secrets.DOCKER_ORG }}/besu:${{ needs.buildDocker.outputs.version }}"
